    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#ffaede",

    <style>
      .glass {
        backdrop-filter: blur(20px);
        background: rgba(18, 18, 31, 0.85);
      }
      .neon-glow {
        box-shadow: 0 0 40px rgba(255, 78, 205, 0.35);
      }
      .days-count {
        font-variant-numeric: tabular-nums;
      }
      .milestone {
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .milestone.reached {
        background: linear-gradient(135deg, #ff4ecd, #7a5cff);
        color: #12121f;
        transform: scale(1.05);
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }

            .cursor-ripple {
        position: fixed;
        top: 0;
        left: 0;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        background: radial-gradient(circle, #ff4ecd, #7a5cff);
        box-shadow: 0 0 10px #ff4ecd, 0 0 20px #7a5cff, 0 0 40px #ff4ecd;
        transform: translate(-50%, -50%);
        transition: transform 0.08s ease-out;
        opacity: 0.9;
      }

      .ripple-click {
        animation: rippleEffect 0.6s ease-out;
      }

      @keyframes rippleEffect {
        0% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(4);
          opacity: 0;
        }
      }
    </style>

      <!-- Set Start Date -->

          onclick="saveStartDate()"
          class="mt-6 w-full py-4 rounded-2xl bg-gradient-to-r from-[#ff4ecd] to-[#7a5cff] text-[#12121f] font-bold tracking-widest hover:scale-105 transition-all"

 <!-- Ripple Cursor -->
    <div class="cursor-ripple"></div>
    <script>

      // Load navbar
fetch('navbar.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('navbar').innerHTML = data;
  });

      
      let startDate = localStorage.getItem("loveStartDate") || "2025-07-30"; // ← CHANGE TO YOUR ACTUAL START DATE

      function calculateDays() {
        const start = new Date(startDate);
        const today = new Date();
        const diffTime = Math.abs(today - start);
        const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        document.getElementById("days-together").textContent = days
          .toString()
          .padStart(3, "0");
      }

      function calculateNextAnniversary() {
        const start = new Date(startDate);
        const today = new Date();
        let nextAnniv = new Date(start);
        nextAnniv.setFullYear(today.getFullYear());
        if (nextAnniv < today) nextAnniv.setFullYear(today.getFullYear() + 1);

        const daysLeft = Math.ceil((nextAnniv - today) / (1000 * 60 * 60 * 24));

        const el = document.getElementById("next-anniversary");
        el.textContent =
          daysLeft === 0
            ? "Today is our anniversary! 🎉"
            : `${daysLeft} days until next anniversary 💖`;
      }

      const milestones = [
        { days: 30, label: "1 Month", emoji: "🌸" },
        { days: 100, label: "100 Days", emoji: "💫" },
        { days: 180, label: "6 Months", emoji: "🌟" },
        { days: 365, label: "1 Year", emoji: "💍" },
        { days: 500, label: "500 Days", emoji: "✨" },
        { days: 730, label: "2 Years", emoji: "❤️" },
        { days: 1000, label: "1000 Days", emoji: "👑" },
      ];

      function renderMilestones() {
        const container = document.getElementById("milestones");
        container.innerHTML = "";
        const currentDays = Math.floor(
          (new Date() - new Date(startDate)) / (1000 * 60 * 60 * 24),
        );

        milestones.forEach((ms) => {
          const reached = currentDays >= ms.days;
          const div = document.createElement("div");
          div.className = `milestone glass rounded-3xl p-6 text-center ${reached ? "reached" : ""}`;

          div.innerHTML = `
          <div class="text-5xl mb-4">${ms.emoji}</div>
          <div class="text-4xl font-bold days-count">${ms.days}</div>
          <div class="text-sm font-label uppercase tracking-widest mt-1 text-[#e3e0f3]/70">${ms.label}</div>
          ${reached ? `<div class="mt-4 text-xs font-medium text-[#12121f]">✓ Reached</div>` : ""}
        `;
          container.appendChild(div);
        });
      }

      function saveStartDate() {
        const inputDate = document.getElementById("start-date").value;
        if (inputDate) {
          localStorage.setItem("loveStartDate", inputDate);
          startDate = inputDate;
          calculateDays();
          calculateNextAnniversary();
          renderMilestones();
          alert("💖 Our love start date has been updated successfully!");
        }
      }

      // Initialize
      document.getElementById("start-date").value = startDate;
      calculateDays();
      calculateNextAnniversary();
      renderMilestones();

      // Auto refresh every 24 hours
      setInterval(() => {
        calculateDays();
        calculateNextAnniversary();
      }, 86400000);

      // Ripple Cursor
      const cursor = document.querySelector(".cursor-ripple");
      document.addEventListener("mousemove", (e) => {
        cursor.style.top = e.clientY + "px";
        cursor.style.left = e.clientX + "px";
      });
      document.addEventListener("click", () => {
        cursor.classList.add("ripple-click");
        setTimeout(() => cursor.classList.remove("ripple-click"), 600);
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      renderPlans();
