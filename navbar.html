<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        darkMode: "class",
        content: ["./**/*.{html,js}"],
        theme: {
          extend: {
            colors: {
              primary: "#ffaede",
              "primary-container": "#ff4ecd",
              secondary: "#c9beff",
              surface: "#12121f",
              "on-surface": "#e3e0f3",
            },
            fontFamily: {
              headline: ["Noto Serif"],
              body: ["Manrope"],
            },
          },
        },
      };
    </script>

    <style>
      .nav-link {
        position: relative;
        transition: color 0.3s ease;
      }
      .nav-link:after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(to right, #ff4ecd, #7a5cff);
        transition: width 0.4s ease;
      }
      .nav-link:hover:after,
      .nav-link.active:after {
        width: 100%;
      }
      .nav-link.active {
        color: #ff4ecd;
      }
    </style>
  </head>
  <body>
    <!-- Reusable Top Navigation Bar -->
    <nav
      class="fixed top-0 w-full z-50 flex justify-between items-center px-6 md:px-10 py-6 bg-[#12121f]/90 backdrop-blur-xl border-b border-white/5 shadow-[0_0_20px_rgba(255,78,205,0.06)]"
    >
      <!-- Logo -->
      <a href="index.html" class="flex items-center gap-3 group">
        <span class="text-3xl">💖</span>
        <div>
          <span
            class="text-2xl font-bold italic tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-[#ff4ecd] to-[#7a5cff] font-headline"
          >
            Our Moments
          </span>
        </div>
      </a>

      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center gap-8 text-sm font-medium">
        <a
          href="index.html"
          class="nav-link text-[#e3e0f3]/70 hover:text-[#e3e0f3] active"
          >You & Me</a
        >
        <a
          href="gallery.html"
          class="nav-link text-[#e3e0f3]/70 hover:text-[#e3e0f3]"
          >Moments</a
        >
        <a
          href="story.html"
          class="nav-link text-[#e3e0f3]/70 hover:text-[#e3e0f3]"
          >Our Story</a
        >
        <a
          href="next.html"
          class="nav-link text-[#e3e0f3]/70 hover:text-[#e3e0f3]"
          >Neon Love</a
        >
        <a
          href="anniversary.html"
          class="nav-link text-[#e3e0f3]/70 hover:text-[#e3e0f3]"
          >Anniversary</a
        >
         <a
          href="letter.html"
          class="nav-link text-[#e3e0f3]/70 hover:text-[#e3e0f3]"
          >Love Letter</a
        >
      </div>

      <!-- Right Side -->
      <div class="flex items-center gap-4">
        <button
          onclick="toggleSearch()"
          class="p-2.5 hover:bg-[#ff4ecd]/10 rounded-full transition-all text-[#e3e0f3]"
        >
          <span class="material-symbols-outlined">search</span>
        </button>

        <button
          class="p-2.5 hover:bg-[#ff4ecd]/10 rounded-full transition-all text-[#e3e0f3]"
        >
          <span class="material-symbols-outlined">favorite</span>
        </button>

        <button
          class="p-2.5 hover:bg-[#ff4ecd]/10 rounded-full transition-all text-[#e3e0f3]"
        >
          <span class="material-symbols-outlined">account_circle</span>
        </button>

        <!-- Mobile Menu Button -->
        <button
          id="mobile-menu-btn"
          class="md:hidden p-2.5 hover:bg-[#ff4ecd]/10 rounded-full transition-all text-[#e3e0f3]"
        >
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>
    </nav>

    <!-- Mobile Menu (Hidden by default) -->
    <div
      id="mobile-menu"
      class="hidden md:hidden fixed top-[73px] left-0 w-full bg-[#12121f]/95 backdrop-blur-xl border-b border-white/10 py-6 z-50"
    >
      <div class="flex flex-col px-8 gap-6 text-lg font-medium">
        <a href="index.html" class="nav-link py-2">You & Me</a>
        <a href="gallery.html" class="nav-link py-2">Moments</a>
        <a href="story.html" class="nav-link py-2">Our Story</a>
        <a href="next.html" class="nav-link py-2">Neon Love</a>
         <a href="anniversary.html" class="nav-link py-2">Anniversary</a>
      </div>
    </div>

    <script>
      // Mobile menu toggle
      const mobileBtn = document.getElementById("mobile-menu-btn");
      const mobileMenu = document.getElementById("mobile-menu");

      mobileBtn.addEventListener("click", () => {
        mobileMenu.classList.toggle("hidden");

        // Change icon
        const icon = mobileBtn.querySelector(".material-symbols-outlined");
        if (mobileMenu.classList.contains("hidden")) {
          icon.textContent = "menu";
        } else {
          icon.textContent = "close";
        }
      });

      // Close mobile menu when clicking a link
      document.querySelectorAll("#mobile-menu a").forEach((link) => {
        link.addEventListener("click", () => {
          mobileMenu.classList.add("hidden");
          mobileBtn.querySelector(".material-symbols-outlined").textContent =
            "menu";
        });
      });

      // Simple search toggle (you can expand this)
      function toggleSearch() {
        const searchTerm = prompt("Search in Our Moments 💖");
        if (searchTerm) {
          alert(
            `Searching for: "${searchTerm}"\n\n(This feature can be expanded later)`,
          );
        }
      }

      // Highlight current page
      function highlightCurrentPage() {
        const currentPath =
          window.location.pathname.split("/").pop() || "index.html";
        document.querySelectorAll(".nav-link").forEach((link) => {
          if (link.getAttribute("href") === currentPath) {
            link.classList.add("active");
          }
        });
      }

      window.addEventListener("load", highlightCurrentPage);
    </script>
  </body>
</html>
